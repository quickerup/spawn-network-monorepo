name: Deploy Registry Service
on:
  push:
    branches: [main]
    paths:
      - 'apps/registry-service/**'
      - 'packages/**'
  workflow_dispatch: {}
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck --workspace=apps/registry-service
      - name: Deploy Registry Service
        run: npm run deploy:registry
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
